services:
  mysql:
    image: mysql:8.4
    container_name: iclassroom-mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+00:00
    environment:
      MYSQL_ROOT_PASSWORD: iclassroom_root_password
      MYSQL_DATABASE: iclassroom
      MYSQL_USER: iclassroom
      MYSQL_PASSWORD: iclassroom_password
      TZ: UTC
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/migrations/000001_init_schema.up.sql:/docker-entrypoint-initdb.d/001_init_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iclassroom-backend
    environment:
      APP_ENV: development
      SERVER_PORT: "8080"
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: iclassroom
      DB_PASSWORD: iclassroom_password
      DB_NAME: iclassroom
      DB_MAX_OPEN_CONNS: "25"
      DB_MAX_IDLE_CONNS: "25"
      DB_CONN_MAX_LIFETIME_MINUTES: "5"
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      FRONTEND_BASE_URL: http://localhost:3000
      BACKEND_BASE_URL: http://localhost:8080
      UPLOAD_DIR: /app/uploads
    ports:
      - "8080:8080"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080
        VITE_WS_BASE_URL: ws://localhost:8080/ws
        VITE_STUDENT_BASE_URL: http://localhost:3000/student
    container_name: iclassroom-frontend
    environment:
      PORT: "4173"
    ports:
      - "3000:4173"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:
  backend_uploads:
